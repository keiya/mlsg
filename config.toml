# mlsg2 Configuration
# See ARCHITECTURE.md for detailed documentation

[general]
language = "ja"
runs_dir = "runs"

[limits]
max_chapters = 5
max_scenes_per_chapter = 6
max_retries = 3
max_parse_retries = 2

[models]
# Development: use claude-sonnet-4-20250514 for speed
# Production: use claude-sonnet-4-5-20250514 for quality
default = "claude-sonnet-4-5-20250929"
validation = "claude-opus-4-5-20251101"  # Opus for MPBV validation
naming = "claude-3-5-haiku-20241022"

[retry]
max_retries = 3
initial_delay = 1.0
max_delay = 60.0
exponential_base = 2.0

# Layer-specific configurations
# Each layer can override: model, temperature, max_tokens, thinking, thinking_budget

[layers.plot]
temperature = 1.0
max_tokens = 16000
thinking = false

[layers.backstory]
temperature = 0.9
max_tokens = 32000
thinking = true
thinking_budget = 16000

[layers.mpbv]
model = "claude-opus-4-5-20251101"  # Use Opus for validation/integration
temperature = 0.7
max_tokens = 64000
thinking = true
thinking_budget = 31999

[layers.character]
temperature = 1.0
max_tokens = 8192
thinking = false

[layers.stylist]
temperature = 0.7
max_tokens = 8192
thinking = false

[layers.chapter]
temperature = 0.7
max_tokens = 16000
thinking = true
thinking_budget = 10000

[layers.timeline]
temperature = 0.3
max_tokens = 16000
thinking = true
thinking_budget = 10000

[layers.scene]
temperature = 1.0
max_tokens = 8192
thinking = false
