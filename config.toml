# mlsg2 Configuration
# See ARCHITECTURE.md for detailed documentation

[general]
language = "ja"
runs_dir = "runs"

# LLM Provider Configuration
# provider: "anthropic" (direct API) or "bedrock" (AWS Bedrock)
# For Bedrock, set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in .env
#
# Bedrock model ID examples:
#   - Claude Opus 4.5: global.anthropic.claude-opus-4-5-20251101-v1:0
#   - Claude Sonnet 4.5: global.anthropic.claude-sonnet-4-5-20250929-v1:0
#   - Claude Haiku 4.5: jp.anthropic.claude-haiku-4-5-20251001-v1:0 (Japan region)
#
[llm_provider]
provider = "bedrock"  # Change to "bedrock" to use AWS Bedrock
aws_region = "ap-northeast-1"  # global. prefix enables cross-region inference

[limits]
max_chapters = 5
max_scenes_per_chapter = 6
max_retries = 3
max_parse_retries = 2

[models]
# For Bedrock, use global. prefix for cross-region inference
default = "global.anthropic.claude-opus-4-5-20251101-v1:0"
validation = "global.anthropic.claude-opus-4-5-20251101-v1:0"
naming = "jp.anthropic.claude-haiku-4-5-20251001-v1:0"

[retry]
max_retries = 3
initial_delay = 1.0
max_delay = 60.0
exponential_base = 2.0

# Layer-specific configurations
# Each layer can override: model, temperature, max_tokens, thinking, thinking_budget

[layers.plot]
model = "global.anthropic.claude-opus-4-5-20251101-v1:0"
temperature = 1.0
max_tokens = 48000
thinking = true
thinking_budget = 31999

[layers.backstory]
model = "global.anthropic.claude-opus-4-5-20251101-v1:0"
temperature = 0.9
max_tokens = 48000
thinking = true
thinking_budget = 31999

[layers.mpbv]
model = "global.anthropic.claude-opus-4-5-20251101-v1:0"
temperature = 0.7
max_tokens = 64000
thinking = true
thinking_budget = 31999

[layers.character]
model = "global.anthropic.claude-opus-4-5-20251101-v1:0"
temperature = 1.0
max_tokens = 8192
thinking = false

[layers.stylist]
model = "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
temperature = 0.7
max_tokens = 8192
thinking = false

[layers.chapter]
model = "global.anthropic.claude-opus-4-5-20251101-v1:0"
temperature = 0.7
max_tokens = 16000
thinking = true
thinking_budget = 10000

[layers.timeline]
model = "global.anthropic.claude-opus-4-5-20251101-v1:0"
temperature = 0.3
max_tokens = 16000
thinking = true
thinking_budget = 10000

[layers.scene]
model = "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
temperature = 1.0
max_tokens = 8192
thinking = false
