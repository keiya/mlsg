# Smoke test configuration
# Haiku for all layers, minimal limits for fast end-to-end validation
# Usage: mlsg run -c config.smoke.toml "テスト用の短い物語"

[general]
language = "ja"
runs_dir = "runs"

[llm_provider]
provider = "anthropic"

[limits]
max_chapters = 1
max_scenes_per_chapter = 1
max_retries = 1
max_parse_retries = 1

[models]
default = "claude-haiku-4-5-20251001"
validation = "claude-haiku-4-5-20251001"
naming = "claude-haiku-4-5-20251001"

[retry]
max_retries = 1
initial_delay = 1.0
max_delay = 10.0
exponential_base = 2.0

[layers.plot]
model = "claude-haiku-4-5-20251001"
temperature = 1.0
max_tokens = 8192
thinking = true
thinking_budget = 4096

[layers.backstory]
model = "claude-haiku-4-5-20251001"
temperature = 0.9
max_tokens = 8192
thinking = true
thinking_budget = 4096

[layers.mpbv]
model = "claude-haiku-4-5-20251001"
temperature = 0.7
max_tokens = 8192
thinking = true
thinking_budget = 4096

[layers.character]
model = "claude-haiku-4-5-20251001"
temperature = 1.0
max_tokens = 4096
thinking = false

[layers.stylist]
model = "claude-haiku-4-5-20251001"
temperature = 0.7
max_tokens = 4096
thinking = false

[layers.chapter]
model = "claude-haiku-4-5-20251001"
temperature = 0.7
max_tokens = 8192
thinking = true
thinking_budget = 4096

[layers.timeline]
model = "claude-haiku-4-5-20251001"
temperature = 0.3
max_tokens = 8192
thinking = true
thinking_budget = 4096

[layers.scene]
model = "claude-haiku-4-5-20251001"
temperature = 1.0
max_tokens = 4096
thinking = false
